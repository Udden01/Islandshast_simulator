; Root-level PlatformIO entrypoint so commands can be run from repository root.
; Existing project settings stay in Arduino Due/platformio.ini.

[platformio]
extra_configs = Arduino Due/platformio.ini
src_dir = Arduino Due/src
include_dir = Arduino Due/include
lib_dir = Arduino Due/lib
test_dir = Arduino Due/test
workspace_dir = Arduino Due/.pio
build_dir = Arduino Due/.pio/build
